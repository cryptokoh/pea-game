[build]
publish = "/home/koh/Documents/noredFarms/pea"
publishOrigin = "config"
commandOrigin = "config"
base = "/home/koh/Documents/noredFarms/pea"
command = "npm ci && cd pea && npm ci && npm run build && cp dist/index.html . && cp -r dist/assets . && cd .."
